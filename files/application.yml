spring:
  application:
    name: flathome-api

  datasource:
    url: jdbc:mariadb://localhost:3306/flathome?useSSL=false&serverTimezone=Asia/Seoul
    username: flathome
    password: flathome1234
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # 운영: validate / 개발: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100   # N+1 방지

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 300000        # 5분 (ms)

server:
  port: 8080

app:
  jwt:
    secret: "flat-home-jwt-secret-key-must-be-at-least-256-bits-long"
    expiry-hours: 24

logging:
  level:
    com.netbreeze.flathome: DEBUG
    org.hibernate.SQL: DEBUG
